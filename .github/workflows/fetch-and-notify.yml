name: 大学オープンキャンパス情報スクレーピング・通知

on:
  schedule:
    # 毎日 20:00 UTC (05:00 JST 翌日)
    - cron: '0 20 * * *'
  
  # 手動トリガー
  workflow_dispatch:

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # commit・push のため
      pages: write
      id-token: write
    
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Python 環境をセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 依存パッケージをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 情報取得・正規化
        id: fetch
        run: |
          python scripts/fetch.py
          # 差分フラグを確認
          if [ -f "data/.has_diff" ]; then
            HAS_DIFF=$(cat data/.has_diff)
            echo "has_diff=${HAS_DIFF}" >> $GITHUB_OUTPUT
          else
            echo "has_diff=0" >> $GITHUB_OUTPUT
          fi
      
      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --quiet || git commit -m "chore: update university opencampus data [skip ci]"
          git push
      
      - name: GitHub Pages 用に docs/index.md を更新
        run: |
          cat > docs/index.md << 'EOF'
          # 大学オープンキャンパス情報
          
          このページは、定期的に自動収集された大学オープンキャンパス情報を表示しています。
          
          **最終更新**: $(date '+%Y年%m月%d日 %H:%M:%S JST')に自動更新
          
          ---
          
          ## 収集対象大学とイベント情報
          
          EOF
          if [ -f "data/accumulated.md" ]; then
            tail -n +2 data/accumulated.md >> docs/index.md
          else
            echo "（データ取得中...）" >> docs/index.md
          fi
          cat >> docs/index.md << 'EOF'
          
          ---
          
          ## 📊 データについて
          
          - **ソース**: `sources.yaml` に登録された検証済みURL からの自動スクレイピング
          - **更新頻度**: 1日1回（朝5時 JST）
          - **形式**: Markdown テーブル + JSON スナップショット
          - **履歴保管**: GitHub リポジトリに完全履歴を蓄積
          
          ## 📧 新規情報通知
          
          テーブルデータに新規追加があった場合、メール通知が送信されます。
          
          ---
          
          **詳細**: [GitHub リポジトリ](https://github.com/mtakahashi1150/univ_info/tree/main/data)
          EOF
      
      - name: docs を git へ追加・コミット・プッシュ
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/
          git diff --quiet || git commit -m "chore: update pages with latest data"
          git push
      
      - name: メール通知（差分がある場合のみ）
        if: steps.fetch.outputs.has_diff == '1'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO_EMAIL: ${{ secrets.NOTIFY_TO_EMAIL }}
        run: |
          python scripts/notify.py
      
      - name: 通知スキップ（差分なし）
        if: steps.fetch.outputs.has_diff == '0'
        run: |
          echo "✓ No changes - skipping notification"

  build-static-site:
    runs-on: ubuntu-latest
    needs: fetch-and-notify
    
    permissions:
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
      
      - name: Python 環境をセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: MkDocs をインストール
        run: |
          pip install mkdocs-material
      
      - name: MkDocs サイトをビルド
        run: |
          mkdocs build
      
      - name: GitHub Pages 用に site を準備
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'
      
      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
